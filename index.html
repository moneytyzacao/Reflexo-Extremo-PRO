<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reflexo Extremo PRO</title>
<meta name="theme-color" content="#0f172a" />

<!-- 🔥 ADSENSE GLOBAL -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5503435586364378"
crossorigin="anonymous"></script>

<style>
/* (mantive seu CSS original intacto) */
:root{
  --bg:#0f172a; --panel:#020617; --border:#1e293b;
  --green:#22c55e; --green2:#16a34a; --cyan:#38bdf8; --red:#ef4444;
}
*{box-sizing:border-box}
body{
  margin:0; font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background:var(--bg); color:#fff; text-align:center;
  transition:background .15s ease;
}
.container{max-width:900px; margin:0 auto; padding:12px}
h1{margin:12px 0 6px; font-size:28px}
.sub{opacity:.8; font-size:14px}
#hud{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:10px; font-weight:600}
.badge{background:#020617; border:1px solid var(--border); padding:6px 10px; border-radius:999px}
#level{color:var(--cyan)}
#gameArea{width:100%; height:58vh; background:var(--panel); position:relative; overflow:hidden; border:2px solid var(--border); border-radius:10px; margin-top:14px;}
.target{width:64px;height:64px;background:var(--red);border-radius:50%;position:absolute;cursor:pointer;}
.controls{margin-top:12px}
button{padding:12px 16px;margin:6px;border:none;border-radius:8px;background:var(--green);cursor:pointer;}
input{padding:10px;margin-top:8px;border-radius:8px;border:1px solid var(--border);background:#020617;color:#fff;width:220px;}
#endScreen{display:none;margin-top:16px}
#adBox{margin-top:12px}
</style>
</head>

<body>
<div class="container">

<h1>⚡ Reflexo Extremo PRO</h1>

<div id="hud">
  <div class="badge">Tempo: <span id="time">30</span>s</div>
  <div class="badge">Pontos: <span id="score">0</span></div>
  <div class="badge">Nível: <span id="level">1</span></div>
</div>

<input id="playerName" placeholder="Seu nome (obrigatório)" />

<div id="gameArea"></div>

<div class="controls">
  <button id="btnPlay">JOGAR AGORA</button>
</div>

<div id="endScreen">
  <h2>Fim de jogo</h2>
  <p>Score: <strong id="finalScore">0</strong></p>

  <!-- 💰 ANÚNCIO -->
  <div id="adBox">
    <ins class="adsbygoogle"
      style="display:block"
      data-ad-client="ca-pub-5503435586364378"
      data-ad-slot="SEU_AD_SLOT_AQUI"
      data-ad-format="auto"
      data-full-width-responsive="true"></ins>
  </div>

  <button id="btnReplay">Jogar novamente</button>
</div>

</div>

<script>
let score=0,time=30,level=1,spawnSpeed=800;
let gameInterval,targetTimeout;

const el=id=>document.getElementById(id);
const gameArea=el("gameArea");

el("btnPlay").onclick=startGame;
el("btnReplay").onclick=startGame;

function startGame(){
  score=0;time=30;level=1;
  updateUI();
  el("endScreen").style.display="none";
  spawnTarget();

  gameInterval=setInterval(()=>{
    time--;
    updateUI();
    if(time<=0) endGame();
  },1000);
}

function updateUI(){
  el("score").innerText=score;
  el("time").innerText=time;
}

function spawnTarget(){
  clearTimeout(targetTimeout);
  const t=document.createElement("div");
  t.className="target";

  const x=Math.random()*(gameArea.clientWidth-60);
  const y=Math.random()*(gameArea.clientHeight-60);

  t.style.left=x+"px";
  t.style.top=y+"px";

  t.onclick=(e)=>{
    e.stopPropagation();
    score++;
    updateUI();
    spawnTarget();
  };

  gameArea.innerHTML="";
  gameArea.appendChild(t);
  targetTimeout=setTimeout(spawnTarget,800);
}

gameArea.addEventListener("click",()=>{
  score=Math.max(0,score-1);
  updateUI();
});

function endGame(){
  clearInterval(gameInterval);
  clearTimeout(targetTimeout);
  gameArea.innerHTML="";
  el("finalScore").innerText=score;
  el("endScreen").style.display="block";

  // 🔥 CARREGAR ANÚNCIO
  try{
    (adsbygoogle = window.adsbygoogle || []).push({});
  }catch(e){
    console.log(e);
  }
}
</script>

</body>
</html>
